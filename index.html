<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMS Produktionsplaner Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3248;
    --accent:#00c896; --accent2:#0084ff; --warn:#ffaa00; --danger:#ff4455;
    --text:#e8eaf0; --text2:#8890aa; --text3:#555d78;
    --s0:#aa88ff; --s1:#0084ff; --s2:#00c896; --s3:#ff9944;
  }
  body.light {
    --bg:#f4f6f9; --surface:#ffffff; --surface2:#eef0f5; --border:#d0d5e0;
    --accent:#00a87a; --accent2:#0066cc; --warn:#e09000; --danger:#d63040;
    --text:#1a1d27; --text2:#555d78; --text3:#9099b0;
    --s0:#7755cc; --s1:#0066cc; --s2:#00a87a; --s3:#d97700;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; transition: background 0.3s; }

  /* Header & Navigation */
  .header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); background:var(--surface); position: sticky; top: 0; z-index: 100; }
  .logo { font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; color:var(--accent); }
  .logo span { color:var(--text2); font-weight:400; }
  
  .sync-status { display:flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text3); }
  .sync-dot { width:8px; height:8px; border-radius:50%; background:var(--text3); }
  .sync-dot.ok { background:var(--accent); box-shadow:0 0 6px var(--accent); }
  .sync-dot.loading { background:var(--warn); animation: pulse 1s infinite; }
  .sync-dot.error { background:var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .tabs { display:flex; gap:2px; padding:12px 24px 0; border-bottom:1px solid var(--border); background:var(--surface); overflow-x: auto; white-space: nowrap; }
  .tab { padding:8px 16px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text2); border-bottom:2px solid transparent; transition:all 0.15s; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }

  .main { padding:24px; }

  /* Buttons */
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:6px; border:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; transition:all 0.15s; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
  .btn-danger { background:transparent; color:var(--danger); border:1px solid var(--danger); padding:4px 8px; border-radius:6px; }
  .btn-danger:hover { background:var(--danger); color:white; }

  /* Grid & Cards */
  .woche-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:28px; }
  .tag-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; cursor:pointer; transition:0.2s; position:relative; }
  .tag-card.selected { border-color:var(--accent); background:var(--surface2); }
  .tag-card.heute::before { content:'HEUTE'; position:absolute; top:8px; right:8px; font-size:9px; color:var(--accent); background:#00c89622; padding:2px 4px; border-radius:3px; }

  .auftrag-row { display:grid; grid-template-columns:50px 100px 70px 1fr 120px 54px 100px 90px 120px; gap:8px; padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:6px; align-items:center; }
  .auftrag-row.fertig { opacity:0.5; border-color:var(--accent); }

  .hallen-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
  .hallen-card { background:var(--surface); border:2px solid var(--border); border-radius:12px; padding:20px; }
  .card-aktiv { border-color:var(--accent); box-shadow: 0 0 15px rgba(0,200,150,0.1); }
  .card-ueberfaellig { border-color:var(--danger); background: #2a1a1a; }

  /* Modals */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; width:600px; max-width:95vw; max-height:90vh; overflow-y:auto; }
  .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text3); text-transform:uppercase; }
  .form-input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:10px; color:white; border: 1px solid var(--border); }
  
  /* Badges */
  .s-badge { padding:2px 6px; border-radius:4px; font-family:monospace; font-weight:bold; font-size:11px; }
  .badge-s0 { background: #aa88ff22; color: #aa88ff; }
  .badge-s1 { background: #0084ff22; color: #0084ff; }
  .badge-s2 { background: #00c89622; color: #00c896; }
  .badge-s3 { background: #ff994422; color: #ff9944; }

  .versand-badge { padding:4px 8px; border-radius:4px; font-size:12px; background:var(--surface2); }
  
  /* Utilities */
  .hidden { display:none !important; }
  .empty { text-align:center; padding:40px; color:var(--text3); }

  @media (max-width: 800px) {
    .auftrag-row { grid-template-columns: 1fr; gap: 10px; }
    .woche-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div id="loginScreen" style="display:flex;position:fixed;inset:0;z-index:9999;background:var(--bg);align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:340px;text-align:center;">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:24px;color:var(--accent);margin-bottom:8px">IMS FLOW</div>
    <input type="password" id="loginInput" placeholder="Passwort" onkeydown="if(event.key==='Enter') checkLogin()"
      style="width:100%;background:var(--surface2);border:1px solid var(--border);padding:12px;color:white;text-align:center;margin-bottom:15px;border-radius:8px;">
    <button onclick="checkLogin()" class="btn btn-primary" style="width:100%;justify-content:center;">Anmelden</button>
  </div>
</div>

<div class="header">
  <div class="logo">IMS <span>Produktionsplaner</span></div>
  <div style="display:flex;align-items:center;gap:15px">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Initialisierung...</span>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Neuer Auftrag</button>
  </div>
</div>

<div class="tabs" id="tabBar">
  <div class="tab active" onclick="switchTab('planung')">Planung</div>
  <div class="tab" onclick="switchTab('gf')">GF-Übersicht</div>
  <div class="tab" onclick="switchTab('versand')">Versand</div>
  <div class="tab" onclick="switchTab('stoerung')" id="tab-btn-stoerung">Störungen</div>
  <div class="tab" onclick="switchTab('ap-CNC')">CNC</div>
  <div class="tab" onclick="switchTab('ap-AP-Armatur')">AP-Armatur</div>
  <div class="tab" onclick="switchTab('ap-UP-Armatur 1')">UP 1</div>
  <div class="tab" onclick="switchTab('ap-UP-Armatur 2')">UP 2</div>
  <div class="tab" onclick="switchTab('ap-Heizung')">Heizung</div>
  <div class="tab" onclick="switchTab('ap-Zusammenbau')">Zusammenbau</div>
</div>

<div id="tab-planung" class="main">
  <div class="woche-grid" id="wocheGrid"></div>
  <div id="auftraegeList"></div>
</div>

<div id="tab-gf" class="main hidden">
  <div class="hallen-grid" id="gfList"></div>
</div>

<div id="tab-versand" class="main hidden">
  <div class="hallen-grid" id="hallenGrid"></div>
</div>

<div id="tab-stoerung" class="main hidden">
  <div class="hallen-grid" id="stoerungGrid"></div>
</div>

<div id="tab-ap" class="main hidden">
  <h2 id="apTitle" style="margin-bottom:20px">Arbeitsplatz</h2>
  <div class="hallen-grid" id="apList"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle" style="margin-bottom:20px">Auftrag erfassen</h3>
    <div class="form-group">
      <label class="form-label">Auftragsnummer</label>
      <input type="text" id="inp-nr" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Kunde</label>
      <input type="text" id="inp-kunde" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Datum</label>
      <input type="date" id="inp-datum" class="form-input">
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-group">
            <label class="form-label">S-Klasse</label>
            <select id="inp-sklasse" class="form-input">
                <option value="S0">S0</option><option value="S1">S1</option>
                <option value="S2" selected>S2</option><option value="S3">S3</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Versandart</label>
            <select id="inp-versandart" class="form-input">
                <option value="Paketdienst">Paketdienst</option>
                <option value="Spedition">Spedition</option>
                <option value="Kundenabholung">Abholung</option>
            </select>
        </div>
    </div>
    <div id="gruppenContainer"></div>
    <button class="btn btn-ghost" onclick="addGruppeRow()" style="margin-top:10px; width:100%">+ Gruppe hinzufügen</button>
    <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
      <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveAuftrag()">Speichern</button>
    </div>
  </div>
</div>

<script>
// --- CONFIG & STATE ---
const JSONBIN_API_KEY = '$2a$10$h7oPTgTwym.FqTXAzcNQqesl2MV2EoR93XgTmLBJlPriGipNL1LV6';
const JSONBIN_BIN_ID = '69c06cdeb7ec241ddc9223d2';
const JSONBIN_BASE = 'https://api.jsonbin.io/v3';

const GRUPPEN_DEF = {
  '0': { name:'Gruppe 0', aps:['CNC','AP-Armatur','Zusammenbau'] },
  '1': { name:'Gruppe 1', aps:['CNC','UP-Armatur 1','UP-Armatur 2','Zusammenbau'] },
  '2': { name:'Gruppe 2', aps:['Heizung'] },
  '3': { name:'Gruppe 3', aps:['CNC','AP-Armatur','Heizung'] }
};

let auftraege = [];
let selectedDatum = new Date().toISOString().split('T')[0];
let currentTab = 'planung';
let editId = null;

// SYNC STATE
let syncTimer = null;
let saveDebounceTimer = null;
const SYNC_INTERVAL = 30000; // 30 Sekunden schont das Rate-Limit

// --- AUTH ---
function checkLogin() {
  if(document.getElementById('loginInput').value === 'imsflow') {
    document.getElementById('loginScreen').style.display = 'none';
    localStorage.setItem('ims_auth', 'true');
    init();
  }
}
if(localStorage.getItem('ims_auth') === 'true') document.getElementById('loginScreen').style.display = 'none';

// --- CORE SYNC ---
async function loadFromStorage() {
  if (document.hidden) return;
  setSyncStatus('loading', 'Prüfe Cloud...');
  try {
    const res = await fetch(`${JSONBIN_BASE}/b/${JSONBIN_BIN_ID}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_API_KEY }
    });
    const data = await res.json();
    const incoming = data.record.auftraege || [];
    
    // Nur bei echten Änderungen updaten
    if (JSON.stringify(incoming) !== JSON.stringify(auftraege)) {
      auftraege = incoming;
      renderAll();
    }
    setSyncStatus('ok', 'Synchronisiert');
  } catch(e) {
    setSyncStatus('error', 'Sync Fehler');
  }
}

async function queueSave() {
  setSyncStatus('loading', 'Wartet...');
  if(saveDebounceTimer) clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(saveToStorage, 2000);
}

async function saveToStorage() {
  setSyncStatus('loading', 'Speichere...');
  try {
    await fetch(`${JSONBIN_BASE}/b/${JSONBIN_BIN_ID}`, {
      method: 'PUT',
      headers: { 
        'Content-Type': 'application/json', 
        'X-Master-Key': JSONBIN_API_KEY,
        'X-Bin-Versioning': 'false' 
      },
      body: JSON.stringify({ auftraege })
    });
    setSyncStatus('ok', 'Gespeichert ✓');
  } catch(e) {
    setSyncStatus('error', 'Fehler beim Speichern');
  }
}

function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot ' + state;
  document.getElementById('syncLabel').textContent = label;
}

// --- LOGIC ---
function renderAll() {
  renderWoche();
  if(currentTab === 'planung') renderPlanung();
  if(currentTab === 'versand') renderVersand();
  if(currentTab === 'gf') renderGF();
  if(currentTab === 'stoerung') renderStoerung();
  if(currentTab.startsWith('ap-')) renderAP(currentTab.split('-')[1]);
}

function renderWoche() {
  const grid = document.getElementById('wocheGrid');
  grid.innerHTML = '';
  const heute = new Date();
  for(let i=0; i<5; i++) {
    const d = new Date();
    d.setDate(heute.getDate() + i);
    const dateStr = d.toISOString().split('T')[0];
    const count = auftraege.filter(a => a.datum === dateStr).length;
    
    const card = document.createElement('div');
    card.className = `tag-card ${dateStr === selectedDatum ? 'selected' : ''}`;
    card.onclick = () => { selectedDatum = dateStr; renderAll(); };
    card.innerHTML = `
      <div style="font-size:11px; color:var(--text3)">${d.toLocaleDateString('de-AT', {weekday:'short'})}</div>
      <div style="font-size:18px; font-weight:bold">${d.getDate()}.</div>
      <div style="font-size:12px; margin-top:5px">${count} Aufträge</div>
    `;
    grid.appendChild(card);
  }
}

function renderPlanung() {
  const list = document.getElementById('auftraegeList');
  const filtered = auftraege.filter(a => a.datum === selectedDatum);
  list.innerHTML = filtered.length ? '' : '<div class="empty">Keine Aufträge für diesen Tag</div>';
  
  filtered.forEach(a => {
    const row = document.createElement('div');
    row.className = `auftrag-row ${a.fertig ? 'fertig' : ''}`;
    row.innerHTML = `
      <div style="font-weight:bold">${a.prio || '–'}</div>
      <div style="font-family:monospace">${a.nr}</div>
      <div>${a.stk || 0} Stk</div>
      <div>
        <div style="font-weight:600">${a.kunde}</div>
        <div style="font-size:10px; color:var(--text3)">${a.versandart}</div>
      </div>
      <div><span class="s-badge badge-${a.sklasse.toLowerCase()}">${a.sklasse}</span></div>
      <div>${a.fertig ? '✓' : '○'}</div>
      <div style="display:flex; gap:5px">
        <button class="btn btn-ghost" onclick="openEdit('${a.id}')">✏</button>
        <button class="btn btn-danger" onclick="deleteAuftrag('${a.id}')">✕</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function renderAP(apName) {
    const list = document.getElementById('apList');
    document.getElementById('apTitle').textContent = "Arbeitsplatz: " + apName;
    list.innerHTML = '';
    
    const relevant = auftraege.filter(a => !a.fertig && 
        a.gruppen.some(g => GRUPPEN_DEF[g.gruppe]?.aps.includes(apName)));
    
    relevant.forEach(a => {
        const apKey = apName.replace(/\s/g, '_');
        const isStationDone = a.stationFertig?.[apKey];
        const card = document.createElement('div');
        card.className = `hallen-card ${isStationDone ? 'card-fertig' : ''}`;
        card.innerHTML = `
            <div style="font-size:20px; font-weight:bold">${a.nr}</div>
            <div style="margin-bottom:10px">${a.kunde}</div>
            <div style="font-size:24px; color:var(--accent)">${a.stk} Stk</div>
            <button class="btn btn-primary" style="width:100%; margin-top:15px" 
                onclick="markStationDone('${a.id}', '${apKey}')">
                ${isStationDone ? 'Erledigt ✓' : 'Abschließen'}
            </button>
        `;
        list.appendChild(card);
    });
}

function renderVersand() {
    const grid = document.getElementById('hallenGrid');
    grid.innerHTML = '';
    const relevant = auftraege.filter(a => a.datum === selectedDatum);
    
    relevant.forEach(a => {
        const card = document.createElement('div');
        card.className = `hallen-card ${a.fertig ? 'card-fertig' : 'card-aktiv'}`;
        card.innerHTML = `
            <div style="font-size:22px; font-weight:bold">${a.nr}</div>
            <div style="font-size:16px">${a.kunde}</div>
            <div style="margin: 10px 0; color:var(--warn)">${a.versandart}</div>
            <button class="btn btn-primary" style="width:100%" onclick="toggleFertig('${a.id}')">
                ${a.fertig ? 'Rückgängig' : 'Versand Fertig'}
            </button>
        `;
        grid.appendChild(card);
    });
}

// --- ACTIONS ---
function openModal() {
  editId = null;
  document.getElementById('modalTitle').textContent = "Neuer Auftrag";
  document.getElementById('inp-datum').value = selectedDatum;
  document.getElementById('gruppenContainer').innerHTML = '';
  addGruppeRow();
  document.getElementById('modalOverlay').classList.add('open');
}

function addGruppeRow(val='', stk='') {
    const container = document.getElementById('gruppenContainer');
    const div = document.createElement('div');
    div.style = "display:grid; grid-template-columns: 1fr 80px 40px; gap:8px; margin-top:8px";
    div.innerHTML = `
        <select class="form-input gr-type">
            ${Object.entries(GRUPPEN_DEF).map(([k,v]) => `<option value="${k}" ${val==k?'selected':''}>${v.name}</option>`)}
        </select>
        <input type="number" class="form-input gr-stk" value="${stk}" placeholder="Stk">
        <button class="btn btn-danger" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(div);
}

function saveAuftrag() {
    const nr = document.getElementById('inp-nr').value;
    const kunde = document.getElementById('inp-kunde').value;
    const datum = document.getElementById('inp-datum').value;
    
    const gruppen = [];
    let totalStk = 0;
    document.querySelectorAll('#gruppenContainer > div').forEach(row => {
        const g = row.querySelector('.gr-type').value;
        const s = parseInt(row.querySelector('.gr-stk').value) || 0;
        gruppen.push({gruppe: g, stk: s});
        totalStk += s;
    });

    if(editId) {
        const a = auftraege.find(x => x.id === editId);
        Object.assign(a, {nr, kunde, datum, gruppen, stk: totalStk, 
            sklasse: document.getElementById('inp-sklasse').value,
            versandart: document.getElementById('inp-versandart').value
        });
    } else {
        auftraege.push({
            id: Date.now().toString(),
            nr, kunde, datum, gruppen, stk: totalStk,
            sklasse: document.getElementById('inp-sklasse').value,
            versandart: document.getElementById('inp-versandart').value,
            fertig: false,
            stationFertig: {}
        });
    }
    closeModal();
    renderAll();
    queueSave();
}

function toggleFertig(id) {
    const a = auftraege.find(x => x.id === id);
    if(a) { a.fertig = !a.fertig; renderAll(); queueSave(); }
}

function markStationDone(id, apKey) {
    const a = auftraege.find(x => x.id === id);
    if(a) {
        if(!a.stationFertig) a.stationFertig = {};
        a.stationFertig[apKey] = !a.stationFertig[apKey];
        renderAll();
        queueSave();
    }
}

function deleteAuftrag(id) {
    if(confirm('Wirklich löschen?')) {
        auftraege = auftraege.filter(x => x.id !== id);
        renderAll();
        queueSave();
    }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event?.target.classList.add('active');
  
  document.querySelectorAll('.main').forEach(m => m.classList.add('hidden'));
  if(tab.startsWith('ap-')) {
      document.getElementById('tab-ap').classList.remove('hidden');
  } else {
      document.getElementById('tab-' + tab).classList.remove('hidden');
  }
  renderAll();
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function init() {
  loadFromStorage();
  setInterval(loadFromStorage, SYNC_INTERVAL);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) loadFromStorage();
  });
}

// Start nur wenn Passwort bereits korrekt war
if(localStorage.getItem('ims_auth') === 'true') init();

</script>
</body>
</html>
