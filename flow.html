<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMS ◆ FLOW</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ────────────────────────────────────────── */
/* Angleichung an station.html (PROJEKT.md): Accent=#00a87a, Violett=HighPrio,
   S-Klassen: S0=lila / S1=blau / S2=gruen / S3=amber, Zone NB=Indigo. */
:root {
  --bg:#0c0e14;--surface:#151820;--surface2:#1c2030;--border:#282e42;
  --accent:#00a87a;--accent-dim:#00a87a18;--accent-mid:#00a87a40;
  --text:#e8ecf4;--text2:#8892a8;--text3:#4a5270;
  --danger:#ef4444;--danger-dim:#ef444415;
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.15);
  /* S-Klassen (Dark-tauglich, semantisch wie station.html) */
  --s0:#a78bfa;--s1:#60a5fa;--s2:#34d399;--s3:#fbbf24;
  /* Zonen-Farben */
  --z-vf:#eab308;--z-vf-dim:#eab30818;--z-vf-mid:#eab30840;
  --z-az:#34d399;--z-az-dim:#34d39918;--z-az-mid:#34d39940;
  --z-zb:#60a5fa;--z-zb-dim:#60a5fa18;--z-zb-mid:#60a5fa40;
  --z-sl:#fbbf24;--z-sl-dim:#fbbf2418;--z-sl-mid:#fbbf2440;
  --z-nb:#6366f1;--z-nb-dim:#6366f118;--z-nb-mid:#6366f140;   /* INDIGO statt Violett */
  --z-vs:#06b6d4;--z-vs-dim:#06b6d418;--z-vs-mid:#06b6d440;
  --radius:10px;--gap:4px;
}
body.light {
  --bg:#f5f7fa;--surface:#ffffff;--surface2:#eef1f6;--border:#d5dbe5;
  --accent:#00a87a;--accent-dim:#d9f4e6;--accent-mid:#60c8a0;
  --text:#1a1d27;--text2:#4b5563;--text3:#8892a6;
  --danger:#d63040;--danger-dim:#ffd9df;
  --purple:#7c3aed;--purple-bg:#f3eefc;
  /* S-Klassen (Light, identisch zu station.html) */
  --s0:#5a3fa8;--s1:#0a4fa0;--s2:#006b4a;--s3:#a04a00;
  /* Zonen */
  --z-vf:#a08000;--z-vf-dim:#fef6d4;--z-vf-mid:#d4b040;
  --z-az:#008060;--z-az-dim:#d0f0e4;--z-az-mid:#40b890;
  --z-zb:#1d4ed8;--z-zb-dim:#dce8fc;--z-zb-mid:#6090e0;
  --z-sl:#b05800;--z-sl-dim:#fde8cc;--z-sl-mid:#e0a040;
  --z-nb:#4338ca;--z-nb-dim:#e0e7ff;--z-nb-mid:#818cf8;       /* INDIGO statt Violett */
  --z-vs:#0e7490;--z-vs-dim:#d4f0f4;--z-vs-mid:#50b0c8;
}
*{margin:0;padding:0;box-sizing:border-box;}

/* ── BODY + HINTERGRUND (Farbblobs + optionaler IMS-Watermark) ───── */
body{
  font-family:'IBM Plex Sans',sans-serif;color:var(--text);
  height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;
  position:relative;
  background:
    radial-gradient(ellipse 900px 700px at 8% -5%,   rgba(52,211,153,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 700px 600px at 105% 35%, rgba(99,102,241,0.38) 0%, transparent 60%),
    radial-gradient(ellipse 600px 500px at 50% 110%, rgba(234,179,8,0.25)  0%, transparent 60%),
    var(--bg);
  background-attachment:fixed;
}
body.light{
  background:
    radial-gradient(ellipse 1200px 900px at 0% 0%,    rgba(0,168,122,0.85) 0%, transparent 55%),
    radial-gradient(ellipse 1000px 800px at 110% 30%, rgba(14,165,233,0.75) 0%, transparent 60%),
    radial-gradient(ellipse 900px 700px at 30% 115%,  rgba(245,158,11,0.70) 0%, transparent 60%),
    linear-gradient(135deg, #fff7ed 0%, #f0fdf4 50%, #eff6ff 100%);
  background-attachment:fixed;
}

/* Main-Content liegt über dem Farbverlauf */
body > *{position:relative;z-index:1;}

/* ── HEADER ────────────────────────────────────────── */
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(21,24,32,0.7);backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%);border-bottom:2.5px solid var(--accent);flex-shrink:0;gap:10px;}
body.light .header{background:rgba(255,255,255,0.75);}
.logo{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:800;color:var(--accent);letter-spacing:3px;white-space:nowrap;}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.clock{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;color:var(--text);line-height:1;}
.sync-wrap{display:flex;align-items:center;gap:4px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:all .3s;}
.sync-dot.ok{background:var(--accent);box-shadow:0 0 8px var(--accent);}
.sync-dot.err{background:var(--danger);box-shadow:0 0 8px var(--danger);}
.sync-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);white-space:nowrap;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:3px 8px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'IBM Plex Sans',sans-serif;white-space:nowrap;}
.theme-btn:hover{border-color:var(--accent);color:var(--text);}

/* ── SEARCH ────────────────────────────────────────── */
.search-wrap{position:relative;flex-shrink:0;}
.search-input{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:4px 10px 4px 26px;color:var(--text);width:140px;outline:none;transition:all .2s;}
.search-input:focus{border-color:var(--accent);width:180px;}
.search-input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3);pointer-events:none;}
.search-dd{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;max-height:220px;overflow-y:auto;z-index:100;display:none;}
.search-dd.show{display:block;}
.search-dd-item{padding:6px 10px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;gap:6px;}
.search-dd-item:last-child{border-bottom:none;}
.search-dd-item:hover{background:var(--accent-dim);color:var(--accent);}
.dd-nr{font-weight:600;color:var(--text);}
.dd-kunde{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── S-FILTER DROPDOWN ─────────────────────────────── */
.s-filter{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:3px 8px;color:var(--text2);cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;min-width:50px;text-align:center;}
.s-filter:focus{border-color:var(--accent);}
.s-filter option{background:var(--surface2);color:var(--text);}

/* ── AKTIV STATUS (dunkelgrün bei laufendem Timer) ─── */
.k-status.aktiv{color:#059669;}
body.light .k-status.aktiv{color:#047857;}
.vf-aktiv-dot,.aktiv-dot{width:6px;height:6px;border-radius:50%;background:#059669;flex-shrink:0;box-shadow:0 0 4px #05966980;animation:pulse 2s infinite;display:inline-block;margin-left:4px;vertical-align:middle;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── MAIN ──────────────────────────────────────────── */
.main{flex:1;display:flex;overflow:hidden;padding:5px;gap:5px;min-height:0;}

/* ── ZONE ──────────────────────────────────────────── */
.zone{display:flex;flex-direction:column;min-width:0;flex:1;}
/* Zone-Head: Frozen Glass + Zonen-Farbton */
.zone-head{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-radius:12px 12px 0 0;flex-shrink:0;gap:6px;backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);}
.zone-head.z-vf{background:var(--z-vf-dim);border:1px solid var(--z-vf-mid);border-bottom:none;}
.zone-head.z-az{background:var(--z-az-dim);border:1px solid var(--z-az-mid);border-bottom:none;}
.zone-head.z-zb{background:var(--z-zb-dim);border:1px solid var(--z-zb-mid);border-bottom:none;}
.zone-head.z-sl{background:var(--z-sl-dim);border:1px solid var(--z-sl-mid);border-bottom:none;}
.zone-head.z-nb{background:var(--z-nb-dim);border:1px solid var(--z-nb-mid);border-bottom:none;}
.zone-head.z-vs{background:var(--z-vs-dim);border:1px solid var(--z-vs-mid);border-bottom:none;}
.zone-title{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.zone-title.z-vf{color:var(--z-vf);}
.zone-title.z-az{color:var(--z-az);}
.zone-title.z-zb{color:var(--z-zb);}
.zone-title.z-sl{color:var(--z-sl);}
.zone-title.z-nb{color:var(--z-nb);}
.zone-title.z-vs{color:var(--z-vs);}
.zone-count{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.zone-body{flex:1;background:rgba(21,24,32,0.45);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);border:1.5px solid var(--border);border-radius:0 0 12px 12px;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:5px;}
body.light .zone-body{background:rgba(255,255,255,0.28);backdrop-filter:blur(22px) saturate(170%);-webkit-backdrop-filter:blur(22px) saturate(170%);}
.zone-body.zb-az{border-color:var(--z-az-mid);}
.zone-body.zb-sl{border-color:var(--z-sl-mid);}
.zone-body.zb-nb{border-color:var(--z-nb-mid);}
.zone-body.zb-vs{border-color:var(--z-vs-mid);}

/* ── KACHEL ────────────────────────────────────────── */
/* Frozen Glass: semi-transparenter BG + backdrop-filter.
   Zone-Farbe nur als 3px Border-Left (vermeidet Doppel-Codierung). */
.kachel{
  background:rgba(28,32,48,0.55);
  backdrop-filter:blur(12px) saturate(150%);
  -webkit-backdrop-filter:blur(12px) saturate(150%);
  border:1px solid rgba(255,255,255,0.08);
  border-left:3px solid var(--border);
  border-radius:10px;padding:9px 11px;
  display:flex;flex-direction:column;gap:3px;
  transition:border-color .2s,background .2s,transform .2s;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
body.light .kachel{
  background:rgba(255,255,255,0.45);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,0.55);
  border-left:3px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.kachel.gruen  {border-left-color:var(--z-az);}
.kachel.orange {border-left-color:var(--z-sl);}
.kachel.rot    {border-left-color:var(--danger);}
.kachel.blau   {border-left-color:var(--z-zb);}
.kachel.violett{border-left-color:var(--z-nb);}  /* nb = Indigo */
.kachel.tuerkis{border-left-color:var(--z-vs);}
.kachel.leer{border:1.5px dashed var(--border);background:transparent;display:flex;align-items:center;justify-content:center;min-height:44px;border-radius:10px;}
.kachel.blockiert{border-color:var(--danger)!important;border-left-color:var(--danger)!important;border-width:1px;border-left-width:4px;background:rgba(214,48,64,0.08)!important;}
body.light .kachel.blockiert{background:#ffe5e9!important;}
.kachel.highlight{box-shadow:0 0 0 2px var(--accent),0 0 12px var(--accent-dim);transform:scale(1.02);z-index:2;position:relative;}

/* Auftragsnr-Hierarchie: Jahr klein/gedaempft, Nr gross/dominant */
.nr-jahr{font-family:'IBM Plex Mono',monospace;font-weight:500;color:var(--text2);font-size:0.75em;margin-right:0.25em;letter-spacing:0;}
.nr-main{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--text);}

.k-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.k-nr{font-size:15px;line-height:1;display:inline-flex;align-items:baseline;}
.k-nr.rot .nr-main{color:var(--danger);}
.k-nr.gruen .nr-main   {color:var(--z-az);}
.k-nr.orange .nr-main  {color:var(--z-sl);}
.k-nr.blau .nr-main    {color:var(--z-zb);}
.k-nr.violett .nr-main {color:var(--z-nb);}
.k-nr.tuerkis .nr-main {color:var(--z-vs);}
.k-kunde{font-size:11px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.k-stk{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:var(--text);line-height:1;}
.k-stk span{font-size:9px;color:var(--text3);font-weight:400;}
.k-dots{display:flex;gap:2px;flex-wrap:wrap;}
.k-dot{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:1px 4px;border-radius:3px;border:1px solid var(--border);color:var(--text3);background:var(--surface);}
.k-dot.f{border-color:var(--z-az);color:var(--z-az);background:var(--z-az-dim);}
.k-status{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;margin-top:auto;padding-top:2px;}
.k-status.gruen{color:var(--z-az);}
.k-status.orange{color:var(--z-sl);}
.k-status.rot{color:var(--danger);}
.k-status.blau{color:var(--z-zb);}
.k-status.violett{color:var(--z-nb);}
.k-status.tuerkis{color:var(--z-vs);}
.k-leer-txt{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);text-align:center;}

/* ── VF KOMPAKT ────────────────────────────────────── */
.vf-row{display:flex;align-items:center;gap:6px;background:rgba(28,32,48,0.55);backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 10px;transition:all .2s;position:relative;box-shadow:0 1px 4px rgba(0,0,0,0.12);}
body.light .vf-row{background:rgba(255,255,255,0.45);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,0.55);box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.vf-row.blockiert{border-color:var(--danger)!important;border-width:2px;background:rgba(239,68,68,0.12)!important;}
body.light .vf-row.blockiert{background:#fde0e0!important;}
.vf-row.aktiv{border-color:var(--z-az);background:var(--z-az-dim);}
.vf-row.highlight{box-shadow:0 0 0 2px var(--accent),0 0 12px var(--accent-dim);z-index:2;}
.vf-nr{font-size:13px;line-height:1;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:baseline;}
.vf-nr.rot .nr-main{color:var(--danger);}
.vf-nr.gruen .nr-main{color:var(--z-az);}
.vf-kunde{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.vf-stk{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;flex-shrink:0;}
.vf-stk span{font-size:9px;color:var(--text3);font-weight:400;}
.vf-blk{font-size:11px;color:var(--danger);flex-shrink:0;}

/* S-Badge: S0=lila, S1=blau, S2=gruen, S3=amber (konsistent zu station.html) */
.sb{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:15px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;flex-shrink:0;letter-spacing:0.03em;}
.sb-s0{background:rgba(167,139,250,0.15);color:var(--s0);border:1px solid rgba(167,139,250,0.4);}
.sb-s1{background:rgba(96,165,250,0.15);color:var(--s1);border:1px solid rgba(96,165,250,0.4);}
.sb-s2{background:rgba(52,211,153,0.15);color:var(--s2);border:1px solid rgba(52,211,153,0.4);}
.sb-s3{background:rgba(251,191,36,0.15);color:var(--s3);border:1px solid rgba(251,191,36,0.4);}
body.light .sb-s0{background:#ece4ff;border-color:#c4b5fd;}
body.light .sb-s1{background:#e0ecff;border-color:#93c5fd;}
body.light .sb-s2{background:#d9f4e6;border-color:#6ee7b7;}
body.light .sb-s3{background:#ffe5d0;border-color:#fdba74;}

/* HighPrio-Badge (Violett, semantisch wie station.html) */
.hp{display:inline-flex;align-items:center;justify-content:center;padding:1px 6px;height:15px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:800;letter-spacing:0.06em;flex-shrink:0;background:var(--purple);color:#fff;text-transform:uppercase;}

/* ── AZ GRID ───────────────────────────────────────── */
.az-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;align-content:start;}

/* ── WARN BADGE ────────────────────────────────────── */
.warn-badge{display:inline-flex;align-items:center;gap:3px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:var(--danger);background:var(--danger-dim);border:1px solid rgba(239,68,68,0.3);border-radius:4px;padding:2px 8px;}

/* ── ZONE SIZES ────────────────────────────────────── */
.zone-vf{flex:1.2;}
.zone-az{flex:2;}
.zone-zb{flex:0.8;}
.zone-sl{flex:0.8;}
.zone-nb{flex:0.8;}
.zone-vs{flex:0.8;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── LIGHT MODE EXPLICIT OVERRIDES ─────────────────── */
/* Zone-Header behalten ihre Tönung (visuelle Spalten-Markierung) */
body.light .zone-head.z-vf{background:#fef6d4;border-color:#d4b040;}
body.light .zone-head.z-az{background:#d0f0e4;border-color:#40b890;}
body.light .zone-head.z-zb{background:#dce8fc;border-color:#6090e0;}
body.light .zone-head.z-sl{background:#fde8cc;border-color:#e0a040;}
body.light .zone-head.z-nb{background:#e0e7ff;border-color:#818cf8;}  /* INDIGO */
body.light .zone-head.z-vs{background:#d4f0f4;border-color:#50b0c8;}
body.light .zone-body.zb-az{border-color:#40b890;}
body.light .zone-body.zb-sl{border-color:#e0a040;}
body.light .zone-body.zb-nb{border-color:#818cf8;}  /* INDIGO */
body.light .zone-body.zb-vs{border-color:#50b0c8;}
body.light .vf-row.aktiv{border-left:3px solid var(--z-az);background:rgba(52,211,153,0.18);}
body.light .k-dot{background:var(--surface);border-color:var(--border);color:var(--text2);}
body.light .k-dot.f{border-color:var(--z-az);color:var(--z-az);background:#d9f4e6;}

/* ── MOBILE ────────────────────────────────────────── */
@media(max-width:900px){
  body{overflow-y:auto;overflow-x:hidden;}
  .header{padding:8px 10px;flex-wrap:wrap;gap:6px;}
  .clock{font-size:18px;}
  .search-input{width:100px;}
  .search-input:focus{width:140px;}
  .main{flex-direction:column;overflow:visible;padding:6px;gap:10px;}
  .zone{flex:unset!important;width:100%;}
  .zone-body{max-height:none;overflow:visible;}
  .az-grid{grid-template-columns:repeat(2,1fr);}
  .k-nr{font-size:14px;}
  .k-stk{font-size:16px;}
}
@media(max-width:480px){.az-grid{grid-template-columns:1fr;}}

/* ── PASSWORT-OVERLAY ──────────────────────────────── */
.pw-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.pw-overlay.hidden{display:none;}
.pw-logo{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;color:var(--accent);letter-spacing:3px;}
.pw-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;}
.pw-input{font-family:'IBM Plex Mono',monospace;font-size:16px;background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:10px 16px;color:var(--text);width:220px;text-align:center;outline:none;transition:border-color .2s;}
.pw-input:focus{border-color:var(--accent);}
.pw-input.err{border-color:var(--danger);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}}
</style>
</head>
<body>

<!-- PASSWORT -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-logo">IMS ◆ FLOW</div>
  <div class="pw-sub">Produktionsfluss</div>
  <input type="password" class="pw-input" id="pwInput" placeholder="Passwort" autocomplete="off">
</div>

<!-- HEADER -->
<div class="header">

  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="Suche…" autocomplete="off">
      <div class="search-dd" id="searchDD"></div>

      <option value="">Alle</option>

</div>

<!-- MAIN -->
<div class="main">
  <div class="zone zone-vf">
    <div class="zone-head z-vf"><span class="zone-title z-vf">Vorfertigung</span><span class="zone-count" id="vf-c" style="color:var(--z-vf)">0</span></div>

    <div class="zone-body zb-az" id="azBody"><div class="az-grid" id="azGrid"></div></div>
  </div>
  <div class="zone zone-zb">
    <div class="zone-head z-zb"><span class="zone-title z-zb">Schäumen</span><span class="zone-count" id="zb-c" style="color:var(--z-zb)">0</span></div>

  </div>

  </div>

    <div class="zone-body zb-vs" id="vsList"></div>
  </div>
</div>

<script>
// ── PASSWORT ──
const PW='imsflow';
const pwO=document.getElementById('pwOverlay'),pwI=document.getElementById('pwInput');
if(sessionStorage.getItem('flow_auth')==='1'){pwO.classList.add('hidden');}
else{pwI.focus();}
pwI.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    if(this.value===PW){sessionStorage.setItem('flow_auth','1');pwO.classList.add('hidden');}
    else{this.classList.add('err');this.value='';setTimeout(()=>this.classList.remove('err'),400);}
  }
});

const SB_URL='https://elwlptapzwwqhjuxnnws.supabase.co';
const SB_KEY='sb_publishable_MbE6UlJorEnYMe6w77Lixw_ttcF5gBx';
let auftraege=[];let searchTerm='';let sFilter='';

const GR={'0':{aps:['CNC','AP-Armatur 1','AP-Armatur 2','Zusammenbau','Nachbearbeitung']},'1':{aps:['CNC','UP-Armatur 1','UP-Armatur 2','Zusammenbau','Nachbearbeitung']},'2':{aps:['Heizung']},'3':{aps:['CNC','AP-Armatur 1','AP-Armatur 2','UP-Armatur 1','UP-Armatur 2','Heizung']},'4':{aps:['CNC','AP-Armatur 1','AP-Armatur 2','UP-Armatur 1','UP-Armatur 2','Heizung']},'5':{aps:['CNC','UP-Armatur 1','UP-Armatur 2','Einbauelement']},'6':{aps:['Versand']}};
const VF_APS=['CNC','AP-Armatur 1','AP-Armatur 2','UP-Armatur 1','UP-Armatur 2','Heizung'];
const ALL_APS=['CNC','AP-Armatur 1','AP-Armatur 2','UP-Armatur 1','UP-Armatur 2','Heizung','Zusammenbau','Nachbearbeitung','Einbauelement'];

function fmtNr(n){
  const s=String(n||'').replace(/\s/g,'');
  const m=s.match(/^(\d{4})(.+)$/);
  if(m)return'<span class="nr-jahr">'+m[1]+'</span><span class="nr-main">'+m[2]+'</span>';
  return s;
}
function getAPs(a){const s=new Set();(a.gruppen||(a.gruppe?[{gruppe:a.gruppe}]:[])).forEach(g=>{if(GR[g.gruppe])GR[g.gruppe].aps.forEach(ap=>s.add(ap));});return[...s];}
function getVFaps(a){return getAPs(a).filter(ap=>VF_APS.includes(ap));}
function sf(a,ap){
  if(!a.stationFertig)return false;
  const k=ap.replace(/[^a-z0-9]/gi,'_');
  if(a.stationFertig[ap]||a.stationFertig[k])return true;
  // UP1 ↔ UP2 gekoppelt: einer fertig = beide fertig
  if(ap==='UP-Armatur 1'||ap==='UP-Armatur 2'){
    const other=ap==='UP-Armatur 1'?'UP-Armatur 2':'UP-Armatur 1';
    const ok=other.replace(/[^a-z0-9]/gi,'_');
    if(a.stationFertig[other]||a.stationFertig[ok])return true;
  }
  // AP1 ↔ AP2 gekoppelt: einer fertig = beide fertig
  if(ap==='AP-Armatur 1'||ap==='AP-Armatur 2'){
    const other=ap==='AP-Armatur 1'?'AP-Armatur 2':'AP-Armatur 1';
    const ok=other.replace(/[^a-z0-9]/gi,'_');
    if(a.stationFertig[other]||a.stationFertig[ok])return true;
  }
  // Legacy: altes 'AP-Armatur' (ohne Nummer) zählt für beide
  if(ap==='AP-Armatur 1'||ap==='AP-Armatur 2'){
    if(a.stationFertig['AP-Armatur']||a.stationFertig['AP_Armatur'])return true;
  }
  return false;
}
// Timer AKTUELL aktiv (läuft gerade)
function ta(a,ap){
  if(!a.timers)return false;
  const k=a.id+'_'+ap.replace(/[^a-z0-9]/gi,'_');
  const t=a.timers[k];
  if(t&&t.start&&!t.end)return true;
  // Fallback: suche in allen Keys
  const needle=ap.replace(/[^a-z0-9]/gi,'_').toLowerCase();
  return Object.keys(a.timers).some(key=>{
    const lk=key.toLowerCase();
    const v=a.timers[key];
    return lk.includes(needle)&&v&&v.start&&!v.end;
  });
}
function sbadge(sk){const s=(sk||'').toLowerCase();return s?'<span class="sb sb-'+s+'">'+sk+'</span>':'';}
function fire(a){return a.highPrio?'<span class="hp" title="High Priority">HIGH</span>':'';}
function apShort(ap){return ap.replace('AP-Armatur 1','AP1').replace('AP-Armatur 2','AP2').replace('AP-Armatur','AP').replace('UP-Armatur 1','UP1').replace('UP-Armatur 2','UP2').replace('Heizung','HZ').replace('Einbauelement','EB');}
function isBlk(a){return(a.blockierungen&&Object.keys(a.blockierungen).length>0)||(a.blockierung&&String(a.blockierung).trim()!=='');}
function blkTxt(a){if(a.blockierungen&&Object.keys(a.blockierungen).length>0)return Object.values(a.blockierungen).filter(Boolean).join(', ');if(a.blockierung)return String(a.blockierung).trim();return'';}
function isMatch(a){if(!searchTerm)return true;const t=searchTerm.toLowerCase();return String(a.nr).includes(t)||String(a.kunde||'').toLowerCase().includes(t);}
function isActive(a){return ALL_APS.some(ap=>ta(a,ap));}

// Durchlaufzeit: Zeit seit erster Einstempelung des Auftrags
function durchlaufzeit(a) {
  let earliest = null;
  // Frühester Timer-Start
  if(a.timers) {
    Object.values(a.timers).forEach(td => {
      if(td.start && (!earliest || td.start < earliest)) earliest = td.start;
    });
  }
  // Früheste stationFertig (falls Timer gelöscht wurde)
  if(a.stationFertig) {
    Object.values(a.stationFertig).forEach(t => {
      if(t && (!earliest || t < earliest)) earliest = t;
    });
  }
  return earliest;
}
function fmtAge(isoStr) {
  if(!isoStr) return '';
  const ms = Date.now() - new Date(isoStr).getTime();
  if(ms < 0) return '';
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  if(h >= 24) { const d = Math.floor(h/24); return d+'d '+(h%24)+'h'; }
  if(h > 0) return h+'h '+m+'m';
  return m+'m';
}
function dlzHtml(a) {
  const entry = durchlaufzeit(a);
  if(!entry) return '';
  const age = fmtAge(entry);
  if(!age) return '';
  const ms = Date.now() - new Date(entry).getTime();
  const h = ms/3600000;
  const color = h > 48 ? 'var(--danger)' : h > 24 ? 'var(--warn,#f59e0b)' : 'var(--text3)';
  return '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:'+color+';margin-top:2px">⏱ '+age+'</div>';
}
// Timer JEMALS gestartet – NUCLEAR: durchsucht das GESAMTE Auftrags-JSON
function tg(a,ap){
  // 1. Prüfe timers direkt
  if(a.timers){
    const k=a.id+'_'+ap.replace(/[^a-z0-9]/gi,'_');
    if(a.timers[k]&&a.timers[k].start)return true;
    const needle=ap.replace(/[^a-z0-9]/gi,'_').toLowerCase();
    const found=Object.keys(a.timers).some(key=>key.toLowerCase().includes(needle)&&a.timers[key]&&a.timers[key].start);
    if(found)return true;
  }
  // 2. Prüfe stationFertig (würde heißen Station ist sogar schon fertig)
  if(sf(a,ap))return true;
  // 3. Nuclear: stringify und suche nach Stationsname in timers-Bereich
  if(a.timers){
    const json=JSON.stringify(a.timers).toLowerCase();
    const needle=ap.toLowerCase().replace(/[^a-z0-9]/g,'');
    if(json.includes(needle))return true;
  }
  return false;
}
function matchSFilter(a){if(!sFilter)return true;return(a.sklasse||'').toUpperCase()===sFilter.toUpperCase();}
function hl(a){return isMatch(a)?' highlight':'';}

function kategorisiere(o){
  const inVF=[],inAZ=[],inZB=[],inSL=[],inNB=[],inVS=[];
  o.forEach(a=>{
    // Alte fertige Aufträge (>30 Tage) komplett ignorieren
    if(a.fertig&&a.fertigAm){
      const tage=(Date.now()-new Date(a.fertigAm).getTime())/(1000*60*60*24);
      if(tage>30)return;
    }
    const vf=getVFaps(a),hatVF=vf.length>0,eineF=hatVF&&vf.some(ap=>sf(a,ap)),alleF=hatVF&&vf.every(ap=>sf(a,ap));
    const zbL=ta(a,'Zusammenbau'),zbG=tg(a,'Zusammenbau'),zbF=sf(a,'Zusammenbau');
    const nbL=ta(a,'Nachbearbeitung'),nbG=tg(a,'Nachbearbeitung'),nbF=sf(a,'Nachbearbeitung');
    if(a.fertig)inVS.push(a);
    else if(nbF)inVS.push(a);
    else if(nbL||nbG)inNB.push(a);
    else if(zbF)inSL.push(a);
    else if(zbL||zbG)inZB.push(a);
    else if(eineF)inAZ.push({...a,_alleVF:alleF});
    else inVF.push(a);
  });
  return{inVF,inAZ,inZB,inSL,inNB,inVS};
}

function tick(){const n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');}
setInterval(tick,1000);tick();

function toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('flow_theme',document.body.classList.contains('light')?'light':'dark');}
if(localStorage.getItem('flow_theme')==='light')document.body.classList.add('light');

// ── SEARCH ──
const sIn=document.getElementById('searchInput'),sDD=document.getElementById('searchDD');
sIn.addEventListener('input',function(){
  const v=this.value.trim();searchTerm=v;
  if(v.length<2){sDD.classList.remove('show');render();return;}
  const m=auftraege.filter(a=>{const t=v.toLowerCase();return String(a.nr).includes(t)||String(a.kunde||'').toLowerCase().includes(t);}).slice(0,8);
  if(!m.length){sDD.classList.remove('show');}else{
    sDD.innerHTML=m.map(a=>'<div class="search-dd-item" data-nr="'+a.nr+'"><span class="dd-nr">'+fmtNr(a.nr)+'</span><span class="dd-kunde">'+a.kunde+'</span></div>').join('');
    sDD.classList.add('show');
    sDD.querySelectorAll('.search-dd-item').forEach(el=>el.addEventListener('click',function(){
      sIn.value=this.dataset.nr;searchTerm=this.dataset.nr;sDD.classList.remove('show');render();
      setTimeout(()=>{const h=document.querySelector('.highlight');if(h)h.scrollIntoView({behavior:'smooth',block:'center'});},100);
    }));
  }
  render();
});
sIn.addEventListener('blur',()=>setTimeout(()=>sDD.classList.remove('show'),200));
sIn.addEventListener('keydown',function(e){if(e.key==='Escape'){this.value='';searchTerm='';sDD.classList.remove('show');render();}});

// ── S-FILTER ──
const sFilterEl=document.getElementById('sFilter');
sFilterEl.addEventListener('change',function(){sFilter=this.value;render();});

// ── LOAD ──
async function load(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/ims_data?id=eq.main&select=auftraege',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    if(!r.ok)throw new Error(r.status);const d=await r.json();
    auftraege=(d[0]?.auftraege||[]);
    document.getElementById('sd').className='sync-dot ok';
    document.getElementById('sl').textContent='Sync '+new Date().toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){document.getElementById('sd').className='sync-dot err';document.getElementById('sl').textContent='Fehler';}
}

function emptyHtml(t){return'<div class="kachel leer"><div class="k-leer-txt">'+t+'</div></div>';}

// Sort by Auftragsnummer aufsteigend
function sortNr(arr){return arr.sort((a,b)=>Number(a.nr)-Number(b.nr));}
// Bei aktiver Suche/Filter: nur Treffer zeigen
function hasFilter(){return!!(searchTerm||sFilter);}
function filterSearch(arr){return arr.filter(a=>isMatch(a)&&matchSFilter(a));}

function render(){
  const{inVF,inAZ,inZB,inSL,inNB,inVS}=kategorisiere(auftraege);
  const hf=hasFilter(), noHit=hf?'kein Treffer':'keine Aufträge';

  // VF
  const vfShow=filterSearch(sortNr(inVF));
  const vfEl=document.getElementById('vfList');
  if(!vfShow.length){vfEl.innerHTML=emptyHtml(noHit);}
  else{vfEl.innerHTML=vfShow.map(a=>{
    const act=isActive(a),b=isBlk(a);
    const cls=(b?'blockiert':act?'aktiv':'');
    const dlz=durchlaufzeit(a);
    const dlzStr=dlz?fmtAge(dlz):'';
    const dlzMs=dlz?Date.now()-new Date(dlz).getTime():0;
    const dlzH=dlzMs/3600000;
    const dlzCol=dlzH>48?'var(--danger)':dlzH>24?'var(--warn,#f59e0b)':'var(--text3)';
    const dlzSpan=dlzStr?'<span style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:'+dlzCol+';margin-left:4px">⏱'+dlzStr+'</span>':'';
    return'<div class="vf-row '+cls.trim()+'"><div class="vf-nr '+(b?'rot':act?'gruen':'')+'">'+fmtNr(a.nr)+'</div><div class="vf-kunde">'+a.kunde+'</div><div class="vf-stk">'+a.stk+'<span> Stk</span></div>'+sbadge(a.sklasse)+fire(a)+dlzSpan+(act&&!b?'<div class="vf-aktiv-dot"></div>':'')+(b?'<div class="vf-blk">⚠</div>':'')+'</div>';
  }).join('');}
  document.getElementById('vf-c').textContent=inVF.length;

  // AZ
  // AZ – Sortierung: 1) ABHOLBEREIT  2) IN ARBEIT  3) STÖRUNG, innerhalb nach Nr
  const azSorted=sortNr(inAZ).sort((a,b)=>{
    const ra=a._alleVF?0:isBlk(a)?2:1;
    const rb=b._alleVF?0:isBlk(b)?2:1;
    return ra-rb;
  });
  const azShow=filterSearch(azSorted);
  const azG=document.getElementById('azGrid');
  if(!azShow.length){azG.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text3);font-size:12px">'+noHit+'</div>';}
  else{azG.innerHTML=azShow.map(a=>{
    const alle=a._alleVF,b=isBlk(a),act=isActive(a);
    const f=alle?'gruen':'orange',cls=f+(b?' blockiert':'');
    const dots=getVFaps(a).map(ap=>'<span class="k-dot '+(sf(a,ap)?'f':'')+'">'+apShort(ap)+'</span>').join('');
    const sCls=b?'rot':act?'aktiv':f;
    const sTxt=b?'⚠ '+blkTxt(a):act?'⚙ IN BEARBEITUNG':(alle?'✓ ABHOLBEREIT':'⏳ IN ARBEIT');
    const dot=act&&!b?'<span class="aktiv-dot"></span>':'';
    return'<div class="kachel '+cls+'"><div class="k-row"><div class="k-nr '+(b?'rot':f)+'">'+fmtNr(a.nr)+'</div>'+sbadge(a.sklasse)+fire(a)+'</div><div class="k-kunde">'+a.kunde+'</div><div class="k-row"><div class="k-stk">'+a.stk+' <span>Stk</span></div></div><div class="k-dots">'+dots+'</div><div class="k-status '+sCls+'">'+sTxt+dot+'</div>'+dlzHtml(a)+'</div>';
  }).join('');}
  const azO=inAZ.length>8,azC=document.getElementById('az-c');
  azC.innerHTML=azO?inAZ.length+' <span class="warn-badge">⚠ &gt;8</span>':inAZ.length+' / 8';
  azC.style.color=azO?'var(--danger)':'var(--z-az)';

  // ZB (Timer läuft immer → dunkelgrün)
  const zbShow=filterSearch(sortNr(inZB));
  const zbEl=document.getElementById('zbList');
  if(!zbShow.length){zbEl.innerHTML=emptyHtml(hf?'kein Treffer':'zieht aus AZ');}
  else{zbEl.innerHTML=zbShow.map(a=>{const b=isBlk(a),act=isActive(a),dot=act&&!b?'<span class="aktiv-dot"></span>':'';return'<div class="kachel blau'+(b?' blockiert':'')+'"><div class="k-row"><div class="k-nr '+(b?'rot':'blau')+'">'+fmtNr(a.nr)+'</div>'+sbadge(a.sklasse)+fire(a)+'</div><div class="k-kunde">'+a.kunde+'</div><div class="k-stk">'+a.stk+' <span>Stk</span></div>'+(b?'<div class="k-status rot">⚠ '+blkTxt(a)+'</div>':'<div class="k-status aktiv">⚙ IN BEARBEITUNG'+dot+'</div>')+dlzHtml(a)+'</div>';}).join('');}
  document.getElementById('zb-c').textContent=inZB.length;

  // SLOT
  const slShow=filterSearch(sortNr(inSL));
  const slEl=document.getElementById('slotList'),slO=inSL.length>3;
  if(!slShow.length){slEl.innerHTML=emptyHtml(hf?'kein Treffer':'○ frei')+(!hf?emptyHtml('○ frei')+emptyHtml('○ frei'):'');}
  else{slEl.innerHTML=slShow.map(a=>{const b=isBlk(a),act=isActive(a),dot=act&&!b?'<span class="aktiv-dot"></span>':'';return'<div class="kachel gruen'+(b?' blockiert':'')+'"><div class="k-row"><div class="k-nr '+(b?'rot':'gruen')+'">'+fmtNr(a.nr)+'</div>'+sbadge(a.sklasse)+fire(a)+'</div><div class="k-kunde">'+a.kunde+'</div><div class="k-stk">'+a.stk+' <span>Stk</span></div>'+(b?'<div class="k-status rot">⚠ '+blkTxt(a)+'</div>':'<div class="k-status orange">bereit für NB'+dot+'</div>')+dlzHtml(a)+'</div>';}).join('');
    if(!hf)for(let i=inSL.length;i<3;i++)slEl.innerHTML+=emptyHtml('○ frei');}
  const slC=document.getElementById('slot-c');
  slC.innerHTML=slO?inSL.length+' <span class="warn-badge">⚠ &gt;3</span>':inSL.length+' / 3';
  slC.style.color=slO?'var(--danger)':'var(--z-sl)';

  // NB (Timer läuft immer → dunkelgrün)
  const nbShow=filterSearch(sortNr(inNB));
  const nbEl=document.getElementById('nbList');
  if(!nbShow.length){nbEl.innerHTML=emptyHtml(noHit);}
  else{nbEl.innerHTML=nbShow.map(a=>{const b=isBlk(a),act=isActive(a),dot=act&&!b?'<span class="aktiv-dot"></span>':'';return'<div class="kachel violett'+(b?' blockiert':'')+'"><div class="k-row"><div class="k-nr '+(b?'rot':'violett')+'">'+fmtNr(a.nr)+'</div>'+sbadge(a.sklasse)+fire(a)+'</div><div class="k-kunde">'+a.kunde+'</div><div class="k-stk">'+a.stk+' <span>Stk</span></div>'+(b?'<div class="k-status rot">⚠ '+blkTxt(a)+'</div>':'<div class="k-status aktiv">⚙ IN BEARBEITUNG'+dot+'</div>')+dlzHtml(a)+'</div>';}).join('');}
  document.getElementById('nb-c').textContent=inNB.length;

  // VS
  // VS – offene oben, fertige unten
  const vsSorted=sortNr(inVS).sort((a,b)=>(a.fertig?1:0)-(b.fertig?1:0));
  const vsShow=filterSearch(vsSorted);
  const vsEl=document.getElementById('vsList');
  if(!vsShow.length){vsEl.innerHTML=emptyHtml(noHit);}
  else{vsEl.innerHTML=vsShow.map(a=>{
    const b=isBlk(a),act=isActive(a),dot=act&&!b?'<span class="aktiv-dot"></span>':'';
    const fertig=!!a.fertig;
    const cls=fertig?'gruen':b?'blockiert':'tuerkis';
    const nrCls=fertig?'gruen':b?'rot':'tuerkis';
    let status='';
    if(b) status='<div class="k-status rot">⚠ '+blkTxt(a)+'</div>';
    else if(fertig) status='<div class="k-status gruen">👍 VERSENDET</div>';
    else if(act) status='<div class="k-status aktiv">⚙ IN BEARBEITUNG'+dot+'</div>';
    return'<div class="kachel '+cls+'"><div class="k-row"><div class="k-nr '+nrCls+'">'+fmtNr(a.nr)+'</div>'+sbadge(a.sklasse)+fire(a)+'</div><div class="k-kunde">'+a.kunde+'</div><div class="k-stk">'+a.stk+' <span>Stk</span></div>'+status+(fertig?'':dlzHtml(a))+'</div>';
  }).join('');}
  document.getElementById('vs-c').textContent=inVS.length;
}

load();setInterval(load,15000);
</script>
</body>
</html>
