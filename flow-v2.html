<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IMS FLOW v2 · Auftragsfluss</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f2ed;
    --surface:#ffffff;
    --ink:#0A192F;
    --muted:#6b6b6b;
    --line:#d8d5cc;
    --teal:#00BFA5;
    --amber:#FFB300;
    --rot:#dc2626;
    --rot-dark:#991b1b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'IBM Plex Sans',sans-serif;
    background:var(--bg);
    color:var(--ink);
    height:100vh;height:100dvh;
    overflow:hidden;
    padding:20px;
    font-weight:600;
    display:flex;flex-direction:column;
  }

  /* ──────── PASSWORT-GATE ──────── */
  .pw-overlay{
    position:fixed;inset:0;background:var(--ink);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:9999;
  }
  .pw-overlay.hidden{display:none;}
  .pw-logo{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:800;color:#fff;letter-spacing:4px;}
  .pw-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8a9bae;text-transform:uppercase;letter-spacing:2px;}
  .pw-input{
    font-family:'IBM Plex Mono',monospace;font-size:16px;
    background:#fff;border:2px solid #fff;
    padding:10px 16px;color:var(--ink);width:240px;text-align:center;outline:none;
    transition:border-color .2s;
  }
  .pw-input:focus{border-color:var(--teal);}
  .pw-input.err{border-color:var(--rot);animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

  /* ──────── HEADER ──────── */
  .header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;
    background:var(--surface);
    border:2px solid var(--ink);
    margin-bottom:20px;
    flex-shrink:0;
    gap:24px;
  }
  .logo{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:800;letter-spacing:3px;color:var(--muted);flex-shrink:0;}
  .kpi-block{
    display:flex;align-items:center;gap:14px;
    font-family:'IBM Plex Mono',monospace;
    flex:1;justify-content:center;
  }
  .kpi-ampel{width:18px;height:18px;background:var(--amber);flex-shrink:0;}
  .kpi-ampel.ok{background:var(--teal);}
  .kpi-ampel.alarm{background:var(--rot);}
  .kpi-label{font-size:12px;font-weight:800;letter-spacing:2.5px;color:var(--muted);}
  .kpi-main{font-size:38px;font-weight:800;letter-spacing:-1.5px;color:var(--ink);line-height:1;}
  .kpi-main .sep{color:var(--muted);margin:0 6px;font-weight:500;}
  .header-right{display:flex;align-items:center;gap:16px;flex-shrink:0;}
  .sync-info{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;}
  .sync-dot{width:8px;height:8px;background:var(--muted);}
  .sync-dot.ok{background:var(--teal);}
  .sync-dot.err{background:var(--rot);}
  .clock{font-family:'IBM Plex Mono',monospace;font-size:32px;font-weight:800;}

  /* ──────── FLOW STRIP ──────── */
  .flow{
    flex:1;
    display:grid;
    grid-template-columns:repeat(6, 1fr);
    gap:14px;
    min-height:0;
  }

  /* Zone-Tile */
  .zone{
    background:var(--surface);
    border:3px solid var(--ink);
    display:flex;flex-direction:column;
    overflow:hidden;
    min-height:0;
  }
  .zone.alarm .z-head{
    background:var(--rot);
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:inset 0 0 0 0 rgba(255,255,255,0);}
    50%{box-shadow:inset 0 0 0 3px rgba(255,255,255,0.5);}
  }

  /* Zone Head */
  .z-head{
    padding:10px 14px;
    background:var(--ink);
    color:#fff;
    display:flex;justify-content:space-between;align-items:center;
    min-height:54px;
    flex-shrink:0;
  }
  .z-name{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  }
  .z-count{
    font-family:'IBM Plex Mono',monospace;
    font-size:26px;font-weight:800;line-height:1;
  }
  .z-count .max{font-size:14px;opacity:0.7;font-weight:700;}

  /* Auftrags-Liste */
  .orders{
    flex:1;
    padding:10px;
    display:flex;flex-direction:column;gap:8px;
    overflow-y:auto;
    min-height:0;
  }
  .orders::-webkit-scrollbar{width:4px;}
  .orders::-webkit-scrollbar-thumb{background:var(--line);}

  /* Einzel-Auftrag */
  .order{
    background:var(--surface);
    border:2px solid var(--ink);
    display:flex;flex-direction:column;
    overflow:hidden;
    flex-shrink:0;
  }
  .order.overfaellig{
    border-left:10px solid var(--rot);
  }
  .o-nr{
    font-family:'IBM Plex Mono',monospace;
    font-size:38px;font-weight:800;
    background:var(--ink);
    color:#fff;
    line-height:1;
    letter-spacing:-1.5px;
    padding:10px 12px;
  }
  .o-nr .jahr{display:none;}
  .o-body{
    padding:10px 12px 0;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
  }
  .o-kunde{
    font-size:12px;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.5px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    flex:1;
  }
  .o-stk{
    font-family:'IBM Plex Mono',monospace;
    font-size:40px;font-weight:800;color:var(--ink);
    line-height:1;
    letter-spacing:-1.5px;
  }
  .o-stk .u{display:none;}
  .o-status{
    margin-top:10px;
    padding:6px 12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;font-weight:800;
    letter-spacing:2px;
    text-transform:uppercase;
    text-align:center;
  }
  .o-status.gruen{background:var(--teal);color:var(--ink);}
  .o-status.orange{background:var(--amber);color:var(--ink);}
  .o-status.rot{background:var(--rot);color:#fff;}

  /* Leere Zone */
  .empty{
    flex:1;
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:2px;
    padding:20px 10px;
    text-align:center;
  }
</style>
</head>
<body>

<!-- PASSWORT-GATE -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-logo">IMS FLOW</div>
  <div class="pw-sub">Auftragsfluss</div>
  <input type="password" class="pw-input" id="pwInput" placeholder="Passwort" autocomplete="off">
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">IMS FLOW</div>
  <div class="kpi-block">
    <div class="kpi-ampel" id="kpiAmpel"></div>
    <div class="kpi-label">HEUTE</div>
    <div class="kpi-main" id="kpiMain">0<span class="sep">/</span>15</div>
  </div>
  <div class="header-right">
    <div class="sync-info"><span class="sync-dot" id="sd"></span><span id="sl">…</span></div>
    <div class="clock" id="clock">--:--</div>
  </div>
</div>

<!-- FLOW -->
<div class="flow">
  <div class="zone" id="zVF">
    <div class="z-head"><div class="z-name">Vorfertigung</div><div class="z-count" id="vfC">0</div></div>
    <div class="orders" id="vfList"></div>
  </div>
  <div class="zone" id="zAZ">
    <div class="z-head"><div class="z-name">Auftragszone</div><div class="z-count" id="azC">0<span class="max">/8</span></div></div>
    <div class="orders" id="azList"></div>
  </div>
  <div class="zone" id="zZB">
    <div class="z-head"><div class="z-name">Schäumen</div><div class="z-count" id="zbC">0</div></div>
    <div class="orders" id="zbList"></div>
  </div>
  <div class="zone" id="zSL">
    <div class="z-head"><div class="z-name">Slot</div><div class="z-count" id="slC">0<span class="max">/3</span></div></div>
    <div class="orders" id="slList"></div>
  </div>
  <div class="zone" id="zNB">
    <div class="z-head"><div class="z-name">Nachbearb.</div><div class="z-count" id="nbC">0</div></div>
    <div class="orders" id="nbList"></div>
  </div>
  <div class="zone" id="zVS">
    <div class="z-head"><div class="z-name">Versand</div><div class="z-count" id="vsC">0</div></div>
    <div class="orders" id="vsList"></div>
  </div>
</div>

<script>
// ── PASSWORT ──
const PW='imsflow';
const pwO=document.getElementById('pwOverlay'),pwI=document.getElementById('pwInput');
if(sessionStorage.getItem('flow_auth')==='1'){pwO.classList.add('hidden');}
else{pwI.focus();}
pwI.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    if(this.value===PW){sessionStorage.setItem('flow_auth','1');pwO.classList.add('hidden');}
    else{this.classList.add('err');this.value='';setTimeout(()=>this.classList.remove('err'),400);}
  }
});

// ── SUPABASE ──
const SB_URL='https://elwlptapzwwqhjuxnnws.supabase.co';
const SB_KEY='sb_publishable_MbE6UlJorEnYMe6w77Lixw_ttcF5gBx';
let auftraege=[];

// ── KONFIGURATION ──
const TAGESZIEL=15;                        // Aufträge/Tag Schichtziel
const UEBERFAELLIG_STUNDEN=48;             // rote Linie links ab Durchlaufzeit in h
const AZ_LIMIT=8;                          // Alarm wenn Auftragszone ueberschritten

// ── ARBEITSGRUPPEN-LOGIK (aus flow.html) ──
const GR={'0':{aps:['CNC','AP-Armatur 1','AP-Armatur 2','Zusammenbau','Nachbearbeitung']},'1':{aps:['CNC','UP-Armatur 1','UP-Armatur 2','Zusammenbau','Nachbearbeitung']},'2':{aps:['Heizung']},'3':{aps:['CNC','AP-Armatur 1','AP-Armatur 2','UP-Armatur 1','UP-Armatur 2','Heizung']},'4':{aps:['CNC','AP-Armatur 1','AP-Armatur 2','UP-Armatur 1','UP-Armatur 2','Heizung']},'5':{aps:['CNC','UP-Armatur 1','UP-Armatur 2','Einbauelement']},'6':{aps:['Versand']}};
const VF_APS=['CNC','AP-Armatur 1','AP-Armatur 2','UP-Armatur 1','UP-Armatur 2','Heizung'];

function fmtNr(n){
  const s=String(n||'').replace(/\s/g,'');
  const m=s.match(/^(\d{4})(.+)$/);
  if(m)return'<span class="jahr">'+m[1]+'</span>'+m[2];
  return s;
}
function getAPs(a){const s=new Set();(a.gruppen||(a.gruppe?[{gruppe:a.gruppe}]:[])).forEach(g=>{if(GR[g.gruppe])GR[g.gruppe].aps.forEach(ap=>s.add(ap));});return[...s];}
function getVFaps(a){return getAPs(a).filter(ap=>VF_APS.includes(ap));}

function sf(a,ap){
  if(!a.stationFertig)return false;
  const k=ap.replace(/[^a-z0-9]/gi,'_');
  if(a.stationFertig[ap]||a.stationFertig[k])return true;
  if(ap==='UP-Armatur 1'||ap==='UP-Armatur 2'){
    const other=ap==='UP-Armatur 1'?'UP-Armatur 2':'UP-Armatur 1';
    const ok=other.replace(/[^a-z0-9]/gi,'_');
    if(a.stationFertig[other]||a.stationFertig[ok])return true;
  }
  if(ap==='AP-Armatur 1'||ap==='AP-Armatur 2'){
    const other=ap==='AP-Armatur 1'?'AP-Armatur 2':'AP-Armatur 1';
    const ok=other.replace(/[^a-z0-9]/gi,'_');
    if(a.stationFertig[other]||a.stationFertig[ok])return true;
    if(a.stationFertig['AP-Armatur']||a.stationFertig['AP_Armatur'])return true;
  }
  return false;
}

function ta(a,ap){
  if(!a.timers)return false;
  const k=a.id+'_'+ap.replace(/[^a-z0-9]/gi,'_');
  const t=a.timers[k];
  if(t&&t.start&&!t.end)return true;
  const needle=ap.replace(/[^a-z0-9]/gi,'_').toLowerCase();
  return Object.keys(a.timers).some(key=>{
    const lk=key.toLowerCase();const v=a.timers[key];
    return lk.includes(needle)&&v&&v.start&&!v.end;
  });
}

function tg(a,ap){
  if(a.timers){
    const k=a.id+'_'+ap.replace(/[^a-z0-9]/gi,'_');
    if(a.timers[k]&&a.timers[k].start)return true;
    const needle=ap.replace(/[^a-z0-9]/gi,'_').toLowerCase();
    if(Object.keys(a.timers).some(key=>key.toLowerCase().includes(needle)&&a.timers[key]&&a.timers[key].start))return true;
  }
  if(sf(a,ap))return true;
  if(a.timers){
    const json=JSON.stringify(a.timers).toLowerCase();
    const needle=ap.toLowerCase().replace(/[^a-z0-9]/g,'');
    if(json.includes(needle))return true;
  }
  return false;
}

function isBlk(a){return(a.blockierungen&&Object.keys(a.blockierungen).length>0)||(a.blockierung&&String(a.blockierung).trim()!=='');}

// Durchlaufzeit in Stunden
function durchlaufStunden(a){
  let earliest=null;
  if(a.timers)Object.values(a.timers).forEach(td=>{if(td.start&&(!earliest||td.start<earliest))earliest=td.start;});
  if(a.stationFertig)Object.values(a.stationFertig).forEach(t=>{if(t&&(!earliest||t<earliest))earliest=t;});
  if(!earliest)return 0;
  return (Date.now()-new Date(earliest).getTime())/3600000;
}

function isOverfaellig(a){
  return isBlk(a)||durchlaufStunden(a)>UEBERFAELLIG_STUNDEN;
}

function kategorisiere(o){
  const inVF=[],inAZ=[],inZB=[],inSL=[],inNB=[],inVS=[];
  o.forEach(a=>{
    if(a.fertig&&a.fertigAm){
      const tage=(Date.now()-new Date(a.fertigAm).getTime())/(1000*60*60*24);
      if(tage>30)return;
    }
    const vf=getVFaps(a),hatVF=vf.length>0,eineF=hatVF&&vf.some(ap=>sf(a,ap)),alleF=hatVF&&vf.every(ap=>sf(a,ap));
    const zbL=ta(a,'Zusammenbau'),zbG=tg(a,'Zusammenbau'),zbF=sf(a,'Zusammenbau');
    const nbL=ta(a,'Nachbearbeitung'),nbG=tg(a,'Nachbearbeitung'),nbF=sf(a,'Nachbearbeitung');
    if(a.fertig)inVS.push(a);
    else if(nbF)inVS.push(a);
    else if(nbL||nbG)inNB.push(a);
    else if(zbF)inSL.push(a);
    else if(zbL||zbG)inZB.push(a);
    else if(eineF)inAZ.push({...a,_alleVF:alleF});
    else inVF.push(a);
  });
  return{inVF,inAZ,inZB,inSL,inNB,inVS};
}

function sortNr(arr){return arr.sort((a,b)=>Number(a.nr)-Number(b.nr));}

// ── KACHEL-RENDERER ──
function renderOrder(a, statusHtml){
  const cls='order'+(isOverfaellig(a)?' overfaellig':'');
  const status=statusHtml||'';
  return '<div class="'+cls+'">'+
    '<div class="o-nr">'+fmtNr(a.nr)+'</div>'+
    '<div class="o-body">'+
      '<div class="o-kunde">'+(a.kunde||'')+'</div>'+
      '<div class="o-stk">'+(a.stk||0)+'<span class="u"> Stk</span></div>'+
    '</div>'+
    status+
  '</div>';
}

function statusHtml(kind,txt){return '<div class="o-status '+kind+'">'+txt+'</div>';}

function emptyBlock(txt){return '<div class="empty">'+txt+'</div>';}

// ── KPI-BLOCK ──
function updateKPI(arr){
  const start=new Date();start.setHours(0,0,0,0);
  const heute=arr.filter(a=>a.fertig&&a.fertigAm&&new Date(a.fertigAm)>=start).length;
  document.getElementById('kpiMain').innerHTML=heute+'<span class="sep">/</span>'+TAGESZIEL;
  const pct=heute/TAGESZIEL;
  const amp=document.getElementById('kpiAmpel');
  amp.className='kpi-ampel';
  if(pct>=0.8)amp.classList.add('ok');
  else if(pct<0.6)amp.classList.add('alarm');
}

// ── RENDER ──
function render(){
  const{inVF,inAZ,inZB,inSL,inNB,inVS}=kategorisiere(auftraege);

  // VF — keine Status-Balken, nur Nummer+Kunde+Stk
  const vfEl=document.getElementById('vfList');
  if(!inVF.length){vfEl.innerHTML=emptyBlock('keine Auftraege');}
  else{vfEl.innerHTML=sortNr(inVF).map(a=>renderOrder(a,'')).join('');}
  document.getElementById('vfC').textContent=inVF.length;

  // AZ — Abholbereit (grün) vor In Arbeit (orange) vor Störung (rot)
  const azSorted=sortNr(inAZ).sort((a,b)=>{
    const ra=a._alleVF?0:isBlk(a)?2:1;
    const rb=b._alleVF?0:isBlk(b)?2:1;
    return ra-rb;
  });
  const azEl=document.getElementById('azList');
  if(!azSorted.length){azEl.innerHTML=emptyBlock('keine Auftraege');}
  else{azEl.innerHTML=azSorted.map(a=>{
    let s;
    if(isBlk(a))s=statusHtml('rot','Stoerung');
    else if(a._alleVF)s=statusHtml('gruen','Abholbereit');
    else s=statusHtml('orange','In Arbeit');
    return renderOrder(a,s);
  }).join('');}
  const azOver=inAZ.length>AZ_LIMIT;
  const azZone=document.getElementById('zAZ');
  azZone.classList.toggle('alarm',azOver);
  document.getElementById('azC').innerHTML=inAZ.length+'<span class="max">/'+AZ_LIMIT+'</span>';

  // ZB Schäumen — In Arbeit
  const zbEl=document.getElementById('zbList');
  if(!inZB.length){zbEl.innerHTML=emptyBlock('zieht aus AZ');}
  else{zbEl.innerHTML=sortNr(inZB).map(a=>{
    const s=isBlk(a)?statusHtml('rot','Stoerung'):statusHtml('orange','In Arbeit');
    return renderOrder(a,s);
  }).join('');}
  document.getElementById('zbC').textContent=inZB.length;

  // SL Slot — Bereit NB
  const slEl=document.getElementById('slList');
  const slOver=inSL.length>3;
  if(!inSL.length){slEl.innerHTML=emptyBlock('3 Slots frei');}
  else{slEl.innerHTML=sortNr(inSL).map(a=>{
    const s=isBlk(a)?statusHtml('rot','Stoerung'):statusHtml('gruen','Bereit NB');
    return renderOrder(a,s);
  }).join('');}
  const slZone=document.getElementById('zSL');
  slZone.classList.toggle('alarm',slOver);
  document.getElementById('slC').innerHTML=inSL.length+'<span class="max">/3</span>';

  // NB Nachbearb — In Arbeit
  const nbEl=document.getElementById('nbList');
  if(!inNB.length){nbEl.innerHTML=emptyBlock('keine Auftraege');}
  else{nbEl.innerHTML=sortNr(inNB).map(a=>{
    const s=isBlk(a)?statusHtml('rot','Stoerung'):statusHtml('orange','In Arbeit');
    return renderOrder(a,s);
  }).join('');}
  document.getElementById('nbC').textContent=inNB.length;

  // VS Versand — Versendet (grün) vs. zum Versand (orange)
  const vsSorted=sortNr(inVS).sort((a,b)=>(a.fertig?1:0)-(b.fertig?1:0));
  const vsEl=document.getElementById('vsList');
  if(!vsSorted.length){vsEl.innerHTML=emptyBlock('keine Auftraege');}
  else{vsEl.innerHTML=vsSorted.map(a=>{
    let s;
    if(isBlk(a))s=statusHtml('rot','Stoerung');
    else if(a.fertig)s=statusHtml('gruen','Versendet');
    else s=statusHtml('orange','Zum Versand');
    return renderOrder(a,s);
  }).join('');}
  document.getElementById('vsC').textContent=inVS.length;

  updateKPI(auftraege);
}

// ── CLOCK ──
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
setInterval(tick,1000);tick();

// ── LOAD ──
async function load(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/ims_data?id=eq.main&select=auftraege',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    auftraege=(d[0]?.auftraege||[]);
    document.getElementById('sd').className='sync-dot ok';
    document.getElementById('sl').textContent='Sync '+new Date().toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){
    document.getElementById('sd').className='sync-dot err';
    document.getElementById('sl').textContent='Fehler';
  }
}

load();setInterval(load,15000);
</script>
</body>
</html>
